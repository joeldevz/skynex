version: 2

project_name: skynex

before:
  hooks:
    - go mod tidy
    - go run ./cmd/tools/sync-assets/

builds:
  - main: ./cmd/skynex
    binary: skynex
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: joeldevz
    name: skynex
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## skynex v{{.Version}}

    ### Install
    **macOS / Linux:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/joeldevz/skynex/main/scripts/install.sh | bash
    ```
    **Windows (PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/joeldevz/skynex/main/scripts/install.ps1 | iex
    ```

brews:
  - repository:
      owner: joeldevz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: main
      pull_request:
        enabled: false
    directory: Formula
    name: skynex
    homepage: "https://github.com/joeldevz/skynex"
    description: "AI agent skills installer for OpenCode and Claude Code"
    license: "MIT"
    commit_msg_template: "chore: update skynex formula to {{ .Tag }}"
    install: bin.install "skynex"
    test: |
      system "#{bin}/skynex", "--version"

scoops:
  - repository:
      owner: joeldevz
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: skynex
    homepage: "https://github.com/joeldevz/skynex"
    description: "AI agent skills installer for OpenCode and Claude Code"
    license: MIT
    commit_msg_template: "chore: update skynex to {{ .Tag }}"
