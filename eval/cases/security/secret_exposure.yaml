id: sec_secret_exposure
item: security
type: positive
agent: security
input: "Security review config/keys.ts for any exposed secrets or credentials."
fixture: sec/secrets
checks:
  - name: detects_secret
    type: contains_any
    patterns: ["hardcoded", "secret", "API key", "credential", "exposed", "plaintext"]
  - name: file_reference
    type: regex_match
    pattern: 'keys\.ts(:\d+)?'
  - name: remediation_present
    type: contains_any
    patterns: ["environment variable", "vault", "secret manager", ".env", "rotate"]
n_runs: 3
aggregation: median
metrics: [tokens_total, duration_ms, cost_usd]
