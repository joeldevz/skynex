id: grill_negative_typo
item: grill-me
type: negative
agent: orchestrator
input: "Fix the typo in README.md line 12: 'recieve' should be 'receive'"
checks:
  - name: no_questions_asked
    type: regex_count
    pattern: '\?'
    value: 0
  - name: no_phase0b_blocks
    type: not_contains
    patterns: ["Bloque", "Block 1", "PURPOSE", "SCOPE", "CONSTRAINTS"]
  - name: attempts_fix
    type: contains_any
    patterns: ["README", "typo", "fix", "cambio", "correg"]
n_runs: 2
aggregation: min
metrics: [tokens_total, duration_ms, cost_usd]
