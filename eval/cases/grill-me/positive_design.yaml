id: grill_positive_design
item: grill-me
type: positive
agent: orchestrator
input: "Help me design a rate limiter for our API"
turns:
  - answer: "use recommended"
  - answer: "token bucket algorithm"
  - answer: "use recommended"
  - answer: "100 requests per minute per user"
  - answer: "use recommended"
max_turns: 10
checks:
  - name: asks_questions
    type: regex_count
    pattern: '\?'
    value: 3
  - name: one_question_at_a_time
    type: regex_count_max_per_msg
    pattern: '\?'
    value: 2
  - name: provides_recommended_answer
    type: contains_any
    patterns: ["recomiendo", "sugiero", "recommend", "suggest"]
  - name: no_premature_code
    type: not_contains_pattern
    pattern: '```\w+'
n_runs: 2
aggregation: min
metrics: [tokens_total, duration_ms, tool_calls_count, cost_usd]
