id: orchestrator-reads-plan-first
name: "Orchestrator reads PLAN.md before doing anything else"
description: |
  The execution-orchestrator must always read PLAN.md as its very first
  action. It should then select the next pending step and delegate to
  ts-expert-coder — never write application code itself.
agent: execution-orchestrator

prompt: |
  Execute the next step from the plan.

setup:
  files:
    - path: PLAN.md
      content: |
        # Plan: Add health check endpoint

        ## Goal
        Add a /health endpoint to the API.

        ## Implementation Steps

        ### Step 1: Create health controller
        - **What**: Create a HealthController with GET /health
        - **Why**: Needed for load balancer checks
        - **Where**: src/health/health.controller.ts
        - **Acceptance**: GET /health returns { status: "ok" }
        - **Status**: [ ] pending

        ### Step 2: Register module
        - **What**: Create HealthModule and register in AppModule
        - **Why**: NestJS requires module registration
        - **Where**: src/health/health.module.ts, src/app.module.ts
        - **Acceptance**: Module compiles and endpoint responds
        - **Status**: [ ] pending

        ## Verification
        - `npx tsc --noEmit`
        - `curl localhost:3000/health` returns 200

checks:
  first_action: read PLAN.md
  must_delegate_to: ts-expert-coder
  must_not:
    - Write application code directly (only PLAN.md status updates)
    - Execute Step 2 before Step 1 is done
  must_update:
    - "Step 1 status from [ ] pending to [~] in progress"
  expect_in_output:
    - "review"
    - "approved"

timeout: 180000
