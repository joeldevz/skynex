name: PR Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-issue-reference:
    name: PR closes an issue
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR body references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const regex = /(closes|fixes|resolves)\s+#(\d+)/i;
            const match = body.match(regex);
            if (!match) {
              core.setFailed('PR body must reference an issue with "Closes #N", "Fixes #N", or "Resolves #N".');
            } else {
              core.info(`PR closes issue #${match[2]}`);
            }

  check-issue-approved:
    name: Linked issue is status:approved
    runs-on: ubuntu-latest
    needs: check-issue-reference
    steps:
      - name: Verify linked issue has status:approved label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(closes|fixes|resolves)\s+#(\d+)/i);
            if (!match) {
              core.setFailed('No linked issue found.');
              return;
            }
            const issueNumber = parseInt(match[2], 10);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const labels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
            if (!labels.includes('status:approved')) {
              core.setFailed(`Issue #${issueNumber} must have label 'status:approved' before merging this PR.`);
            } else {
              core.info(`Issue #${issueNumber} is status:approved ✅`);
            }

  check-type-label:
    name: PR has exactly one type:* label
    runs-on: ubuntu-latest
    steps:
      - name: Verify type label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const typeLabels = labels.filter(l => l.startsWith('type:'));
            if (typeLabels.length === 0) {
              core.setFailed('PR must have exactly one type:* label (type:skill, type:agent, type:plugin, type:command, type:doc, type:meta).');
            } else if (typeLabels.length > 1) {
              core.setFailed(`PR has ${typeLabels.length} type:* labels: ${typeLabels.join(', ')}. Must have exactly one.`);
            } else {
              core.info(`PR has type label: ${typeLabels[0]}`);
            }

  check-skill-rules:
    name: SKILL.md compliance (Description Trap + ≤120 lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed SKILL.md files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep 'SKILL\.md$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Verify line count and Description Trap
        if: steps.changed.outputs.files != ''
        run: |
          set -e
          FAIL=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            # Line count check
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 120 ]; then
              echo "::error file=$file::SKILL.md exceeds 120 lines ($LINES). Split into references/*.md (≤200 each)."
              FAIL=1
            fi

            # Description Trap check (heuristic: description should start with "Use when")
            DESC=$(grep -A1 '^description:' "$file" | tr -d '\n' | head -c 300)
            if echo "$DESC" | grep -qiE '(triggers when|generates|produces|creates|implements|provides) '; then
              echo "::warning file=$file::Description may resume workflow. Should start with 'Use when X'. Review Description Trap rule."
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
